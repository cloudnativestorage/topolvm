              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: LogicalVolumeSpec defines the desired state of LogicalVolume
            properties:
              accessType:
                description: |-
                  'accessType' specifies how the user intends to consume the snapshot logical volume.
                  Set to "ro" when creating a snapshot and to "rw" when restoring a snapshot or creating a clone.
                  This field is populated only when LogicalVolume has a source.
                type: string
              deviceClass:
                type: string
              encryption:
                description: |-
                  Encryption configures transparent data encryption (LUKS2) for this volume.
                  When nil or Enabled=false, the legacy unencrypted code path is used.
                properties:
                  cipher:
                    description: Cipher is the LUKS2 cipher (default aes-xts-plain64).
                    type: string
                  enabled:
                    description: Enabled gates encryption for this volume. Absence
                      is equivalent to Enabled=false.
                    type: boolean
                  integrity:
                    description: |-
                      Integrity selects authenticated encryption: "" (off) or "hmac-sha256".
                      Set at provision time only; cannot be added to an existing volume
                      without a full reencrypt or clone-and-migrate.
                    enum:
                    - ""
                    - hmac-sha256
                    type: string
                  integrityNoWipe:
                    description: |-
                      IntegrityNoWipe skips the initial integrity wipe. See
                      design/tde/TDE-Option-dm-integrity.md for the unwritten-sector caveat.
                    type: boolean
                  keyRef:
                    description: KeyRef is the provider-specific KEK identifier.
                    type: string
                  keySize:
                    description: KeySize is the LUKS2 key size in bits (default 512).
                    format: int32
                    type: integer
                  provider:
                    description: Provider names the KeyProvider used to wrap the DEK
                      (vault, aws-kms, gcp-kms, azure-kv, pkcs11).
                    type: string
                type: object
