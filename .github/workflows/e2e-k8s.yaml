name: "e2e-k8s"
on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "CODEOWNERS"
  push:
    paths-ignore:
      - "**/*.md"
      - "CODEOWNERS"
    branches:
      - "main"

jobs:
  build:
    runs-on: "ubuntu-22.04"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: "go.mod"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: cache e2e sidecar binaries
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            test/e2e/tmpbin
          key: e2e-sidecars-${{ hashFiles('csi-sidecars.mk', 'versions.mk') }}
          restore-keys: |
            e2e-sidecars-
      - run: make -C test/e2e setup
      - run: make -C test/e2e topolvm.img
      - uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            bin
            test/e2e/bin
            test/e2e/topolvm.img
          key: e2e-cache-${{ github.sha }}

  default:
    needs: build
    uses: ./.github/workflows/e2e-k8s-workflow.yaml
    with:
      test_scheduler_extender_type: "daemonset"
      test_legacy: "false"

  scheduler-manifest:
    needs: build
    uses: ./.github/workflows/e2e-k8s-workflow.yaml
    with:
      test_scheduler_extender_type: "deployment"
      test_legacy: "false"

  use-legacy:
    needs: build
    uses: ./.github/workflows/e2e-k8s-workflow.yaml
    with:
      test_scheduler_extender_type: "deployment"
      test_legacy: "true"

  storage-capacity-scoring:
    needs: build
    uses: ./.github/workflows/e2e-k8s-workflow.yaml
    with:
      test_scheduler_extender_type: "none"
      test_legacy: "false"
