                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              currentSize:
                anyOf:
                - type: integer
                - type: string
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              encryption:
                description: Encryption reports the observed encryption state of this
                  volume.
                properties:
                  activeKeyID:
                    description: ActiveKeyID is the EncryptionKey object name that
                      currently unlocks this volume.
                    type: string
                  headerUUID:
                    description: HeaderUUID is the LUKS2 header UUID, identifies the
                      on-disk header.
                    type: string
                  keyslot:
                    description: Keyslot is the LUKS2 keyslot occupied by the active
                      passphrase.
                    format: int32
                    type: integer
                  masterKeyEpoch:
                    description: MasterKeyEpoch is bumped only by a completed reencrypt.
                    format: int32
                    type: integer
                  state:
                    description: State is the current encryption lifecycle state.
                    type: string
                type: object
              message:
