name: "Release Charts"

# Manual dispatch only: run this AFTER the images are published and the chart
# has been updated to pin the published image digest (see create-chart-update-pr).
on: "workflow_dispatch"

permissions:
  # contents: write is required to create the topolvm-chart-v<version> tag and
  # the GitHub Release below.
  contents: write
  packages: write

env:
  # OCI registry namespace the packaged chart is pushed to. Consumers install with:
  #   helm install topolvm oci://ghcr.io/appscode-charts/topolvm --version <version>
  CHART_OCI_REPO: "oci://ghcr.io/appscode-charts"

jobs:
  release:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      # helm >= 3.8 is required for OCI support.
      - name: "Install Helm"
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: "v3.20.2"

      # cert-manager is a chart dependency; add its repo so `helm dependency
      # update` can resolve it before packaging.
      - name: "Add cert-manager repo for helm"
        run: |
          helm repo add cert-manager https://charts.jetstack.io

      - name: "Package chart"
        id: package
        run: |
          version=$(helm show chart charts/topolvm | awk '/^version:/ {print $2}')
          if [ -z "${version}" ]; then
            echo "::error::Could not determine chart version from charts/topolvm/Chart.yaml" >&2
            exit 1
          fi
          helm dependency update charts/topolvm
          helm package charts/topolvm -d /tmp/chart-pkg
          pkg="/tmp/chart-pkg/topolvm-${version}.tgz"
          if [ ! -f "${pkg}" ]; then
            echo "::error::Expected packaged chart ${pkg} not found" >&2
            exit 1
          fi
          # Pre-releases (chart versions containing a hyphen, e.g. 17.0.0-ac.1)
          # are flagged as GitHub pre-releases.
          if echo "${version}" | grep -q "-"; then prerelease=true; else prerelease=false; fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "package=${pkg}" >> "${GITHUB_OUTPUT}"
          echo "tag=topolvm-chart-v${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: "Push chart to GHCR (OCI)"
        run: |
          echo "${{ secrets.LGTM_GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm push "${{ steps.package.outputs.package }}" "${CHART_OCI_REPO}"

      - name: "Determine previous chart tag"
        id: previous
        run: |
          # Newest existing topolvm-chart-v<x.y.z>[-...] tag, excluding the one
          # being released, is used as the changelog base (see RELEASE.md).
          RESP=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/git/matching-refs/tags/topolvm-chart-v)
          PREV_TAG=$(echo "${RESP}" | jq -r '.[].ref' | awk -F "/" '{print $3}' | \
            grep -E "^topolvm-chart-v[0-9]+\.[0-9]+\.[0-9]+" | \
            grep -vx "${{ steps.package.outputs.tag }}" | sort -V -r | head -n 1)
          if [ -z "${PREV_TAG}" ]; then
            echo "::error::Could not determine a previous topolvm-chart-v tag for the changelog" >&2
            exit 1
          fi
          echo "previous_tag=${PREV_TAG}" >> "${GITHUB_OUTPUT}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Create GitHub Release"
        run: |
          # Creates the topolvm-chart-v<version> tag (at this commit) and a draft
          # release with auto-generated notes. Edit and publish it per RELEASE.md.
          # see https://docs.github.com/en/rest/releases/releases?apiVersion=2022-11-28#create-a-release
          gh api \
            -H "Accept: application/vnd.github+json" \
            --method POST \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/releases \
            -f name="Chart ${{ steps.package.outputs.tag }}" \
            -f tag_name="${{ steps.package.outputs.tag }}" \
            -f target_commitish="${{ github.sha }}" \
            -f previous_tag_name="${{ steps.previous.outputs.previous_tag }}" \
            -F draft=true \
            -F prerelease=${{ steps.package.outputs.prerelease }} \
            -F generate_release_notes=true
          gh release upload "${{ steps.package.outputs.tag }}" "${{ steps.package.outputs.package }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
