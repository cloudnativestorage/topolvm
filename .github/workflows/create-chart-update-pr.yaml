name: "Create chart update Pull Request"

on:
  workflow_dispatch:
    inputs:
      app-version:
        description: app version (e.g. 0.1.0)
        type: string
      chart-version:
        description: chart version (e.g. 0.1.0)
        type: string

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  create-chart-update-pr:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Validate input"
        run: |
          # The exit code will be 1 if the pattern is not found by grep.
          # Accept the fork's semver prerelease suffix, e.g. 0.41.0-ac.1 / 17.0.0-ac.1.
          echo ${{ inputs.app-version }} | grep -E "^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$"
          echo ${{ inputs.chart-version }} | grep -E "^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Configure Git
        run: |
          # ref. https://github.com/orgs/community/discussions/26560#discussioncomment-3252340
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: "Create a branch"
        run: |
            git switch main
            git pull
            git switch -c bump-chart-${{ inputs.chart-version }}
      - name: "Resolve image digest"
        id: image
        run: |
          digest=$(gh api --paginate "/orgs/cloudnativestorage/packages/container/topolvm-with-sidecar/versions" \
            --jq "[.[] | select(.metadata.container.tags[]? == \"${{ inputs.app-version }}\") | .name] | first")
          if [ -z "$digest" ] || [ "$digest" = "null" ]; then
            echo "::error::Could not find a digest for tag ${{ inputs.app-version }} in ghcr.io/cloudnativestorage/topolvm-with-sidecar" >&2
            exit 1
          fi
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: "Update files"
        run: |
          ver='[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?'
          sed -r -i "s/checkout topolvm-chart-v${ver}/checkout topolvm-chart-v${{ inputs.chart-version }}/g" example/README.md
          sed -r -i "s/appVersion: ${ver}/appVersion: ${{ inputs.app-version }}/g" charts/topolvm/Chart.yaml
          sed -r -i "s/^version: ${ver}/version: ${{ inputs.chart-version }}/g" charts/topolvm/Chart.yaml
          sed -r -i "s#ghcr.io/cloudnativestorage/topolvm-with-sidecar:${ver}#ghcr.io/cloudnativestorage/topolvm-with-sidecar:${{ inputs.app-version }}#g" charts/topolvm/Chart.yaml
          sed -r -i "s#ghcr.io/cloudnativestorage/topolvm:${ver}#ghcr.io/cloudnativestorage/topolvm:${{ inputs.app-version }}#g" charts/topolvm/Chart.yaml
          sed -r -i "s/^(  reference:).*/\1 ${{ inputs.app-version }}@${{ steps.image.outputs.digest }}/" charts/topolvm/values.yaml
          make install-helm-docs && make generate-helm-docs
      - name: "Create pull request"
        # Uses the default GITHUB_TOKEN; the repo setting
        # "Allow GitHub Actions to create and approve pull requests" must be enabled.
        run: |
          git commit -a -s -m "Bump chart version to ${{ inputs.chart-version }}"
          git push --set-upstream origin bump-chart-${{ inputs.chart-version }}
          gh pr create --draft --fill
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
