name: "Release Charts"

on: "workflow_dispatch"

jobs:
  release:
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
      packages: write
    steps:
      - name: "Checkout"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: "Configure Git"
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      # This version is written in `charts/topolvm/README.md`,
      # so do not update it if not necessary.
      - name: "Install Helm"
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: "v3.5.0"

      # Add depending repository for helm to avoid the error below.
      # `Error: no repository definition for https://charts.jetstack.io`
      # see: https://github.com/helm/chart-releaser-action/issues/74
      - name: "Add cert-manager repo for helm"
        run: |
          helm repo add cert-manager https://charts.jetstack.io

      - name: "Run chart-releaser"
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          config: .cr.yaml
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      # The gh-pages index is only served when GitHub Pages is enabled on the
      # repository. Also push the chart to GHCR as an OCI artifact so it is
      # installable without Pages:
      #   helm install topolvm oci://ghcr.io/cloudnativestorage/charts/topolvm --version <version>
      - name: "Push chart to GHCR (OCI)"
        run: |
          # helm >= 3.8 is required for OCI support; install to /tmp to keep
          # the chart-releaser helm (pinned above) untouched.
          curl -fsSL https://get.helm.sh/helm-v3.20.2-linux-amd64.tar.gz \
            | tar xz -C /tmp --strip-components 1 linux-amd64/helm
          echo "${{ secrets.GITHUB_TOKEN }}" | /tmp/helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          /tmp/helm dependency update charts/topolvm
          /tmp/helm package charts/topolvm -d /tmp/chart-pkg
          /tmp/helm push /tmp/chart-pkg/topolvm-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
