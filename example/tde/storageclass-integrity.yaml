apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: topolvm-encrypted-integrity
provisioner: topolvm.io
parameters:
  topolvm.io/device-class: "ssd"
  topolvm.io/encryption: "true"
  topolvm.io/key-provider: "vault"
  topolvm.io/key-ref: "transit/keys/topolvm"
  topolvm.io/cipher: "aes-xts-plain64"
  topolvm.io/key-size: "512"
  # Authenticated encryption. Off by default; read docs/tde/integrity.md
  # before enabling. Cannot be toggled after the LV is formatted.
  topolvm.io/integrity: "hmac-sha256"
  csi.storage.k8s.io/fstype: "ext4"
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete
